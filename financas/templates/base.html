<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinHome | Gestão Inteligente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --sidebar-width: 260px;
            --primary-gradient: linear-gradient(135deg, #0d6efd 0%, #0a58ca 100%);
        }
        
        body { 
            background-color: #f8f9fa;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            transition: all 0.3s ease;
        }

        /* Sidebar Modernizada */
        .sidebar { 
            width: var(--sidebar-width);
            min-height: 100vh; 
            background: #ffffff; 
            border-right: 1px solid rgba(0,0,0,0.05);
            padding-top: 24px; 
            position: fixed;
            z-index: 1000;
        }
        
        .sidebar-brand {
            padding: 0 24px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 700;
            font-size: 1.25rem;
            color: #0d6efd;
        }

        .sidebar a { 
            color: #6c757d; 
            text-decoration: none; 
            padding: 12px 24px; 
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.2s;
            margin: 4px 12px;
            border-radius: 8px;
            font-weight: 500;
        }
        
        .sidebar a i { font-size: 1.2rem; }
        
        .sidebar a:hover { 
            color: #0d6efd; 
            background-color: #f0f7ff; 
        }
        
        .sidebar a.active { 
            color: #ffffff; 
            background: var(--primary-gradient);
            box-shadow: 0 4px 12px rgba(13, 110, 253, 0.2);
        }

        /* Conteúdo Principal */
        main { 
            margin-left: var(--sidebar-width);
            padding: 32px;
            min-height: 100vh;
        }

        .card { 
            border: none; 
            box-shadow: 0 0.125rem 0.5rem rgba(0, 0, 0, 0.05); 
            border-radius: 16px; 
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .card:hover { transform: translateY(-2px); box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.08); }

        .btn-primary { 
            border-radius: 10px; 
            padding: 8px 20px;
            font-weight: 600;
            background: var(--primary-gradient);
            border: none;
        }

        /* Dark Mode Estilizado */
        [data-bs-theme="dark"] {
            --bs-body-bg: #0b0e14;
        }
        [data-bs-theme="dark"] .sidebar { background-color: #12151c; border-right-color: #2d323c; }
        [data-bs-theme="dark"] .sidebar a:hover { background-color: #1e2430; color: #3d8bfd; }
        [data-bs-theme="dark"] .card { background-color: #1a1f29; }
        [data-bs-theme="dark"] .sidebar-brand { color: #3d8bfd; }

        .text-receita { color: #198754; }
        .text-despesa { color: #dc3545; }

        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); transition: 0.3s; }
            .sidebar.show { transform: translateX(0); }
            main { margin-left: 0; }
        }
    </style>
</head>
<body>
    <!-- Mobile Toggle -->
    <button class="btn btn-primary d-md-none position-fixed bottom-0 end-0 m-3 z-3 shadow" type="button" onclick="document.querySelector('.sidebar').classList.toggle('show')">
        <i class="bi bi-list"></i>
    </button>

    <div class="container-fluid p-0">
        <div class="d-flex">
            <!-- Sidebar Modernizada -->
            <nav class="sidebar shadow-sm">
                <div class="sidebar-brand">
                    <div class="bg-primary text-white rounded-3 p-2 d-flex align-items-center justify-content-center" style="width: 40px; height: 40px;">
                        <i class="bi bi-layers-fill"></i>
                    </div>
                    <span>FinHome</span>
                </div>

                <div class="nav flex-column mt-2">
                    <a href="{% url 'dashboard' %}" class="{% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
                    <a href="{% url 'transacao_list' %}" class="{% if 'transacao' in request.resolver_match.url_name %}active{% endif %}"><i class="bi bi-arrow-down-up"></i> Transações</a>
                    <a href="{% url 'transferencia_create' %}" class="{% if request.resolver_match.url_name == 'transferencia_create' %}active{% endif %}"><i class="bi bi-arrow-left-right"></i> Transferências</a>
                    <a href="{% url 'calendario' %}" class="{% if request.resolver_match.url_name == 'calendario' %}active{% endif %}"><i class="bi bi-calendar-week"></i> Calendário</a>
                    <a href="{% url 'conta_list' %}" class="{% if 'conta' in request.resolver_match.url_name %}active{% endif %}"><i class="bi bi-bank2"></i> Minhas Contas</a>
                    <a href="{% url 'meta_list' %}" class="{% if 'meta' in request.resolver_match.url_name %}active{% endif %}"><i class="bi bi-trophy"></i> Metas</a>
                    <a href="{% url 'recorrencia_list' %}" class="{% if 'recorrencia' in request.resolver_match.url_name %}active{% endif %}"><i class="bi bi-repeat"></i> Recorrências</a>
                    <a href="{% url 'importar_extrato' %}" class="{% if request.resolver_match.url_name == 'importar_extrato' %}active{% endif %}"><i class="bi bi-cloud-upload"></i> Importação</a>
                    <a href="{% url 'ajuda' %}" class="{% if request.resolver_match.url_name == 'ajuda' %}active{% endif %}"><i class="bi bi-patch-question"></i> Ajuda</a>
                </div>

                <div class="mt-auto px-4 pb-4">
                    <div class="card bg-light border-0 p-3 mb-3">
                        <small class="text-muted d-block mb-2">Aparência</small>
                        <button id="darkModeToggle" class="btn btn-sm w-100 btn-outline-secondary d-flex align-items-center justify-content-between">
                            <span>Tema</span>
                            <i class="bi bi-moon-stars"></i>
                        </button>
                    </div>
                </div>
            </nav>

            <!-- Main Content -->
            <main class="w-100">
                
                <!-- Toast Notifications -->
                <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 1050;">
                    {% if messages %}
                        {% for message in messages %}
                        <div class="toast align-items-center text-bg-{{ message.tags|default:'primary' }} border-0 show" role="alert" aria-live="assertive" aria-atomic="true">
                            <div class="d-flex">
                                <div class="toast-body">
                                    <i class="bi bi-info-circle-fill me-2"></i> {{ message }}
                                </div>
                                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
                            </div>
                        </div>
                        {% endfor %}
                    {% endif %}
                </div>

                <!-- Top Navbar -->
                <div class="d-flex justify-content-between align-items-center mb-5">
                    <div>
                        <h4 class="fw-bold mb-0">Olá, Christian</h4>
                        <p class="text-muted small mb-0">{% now "l, d \d\e F \d\e Y" %}</p>
                    </div>
                    <div class="d-flex gap-3 align-items-center">
                        <form action="{% url 'transacao_list' %}" method="get" class="d-none d-lg-block">
                            <div class="input-group">
                                <span class="input-group-text bg-white border-end-0 border-0 shadow-sm"><i class="bi bi-search"></i></span>
                                <input type="text" name="q" class="form-control border-start-0 border-0 shadow-sm" placeholder="Buscar...">
                            </div>
                        </form>
                        <div class="vr"></div>
                        <a href="/admin" class="btn btn-light shadow-sm border-0"><i class="bi bi-gear"></i></a>
                    </div>
                </div>

                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const toggleBtn = document.getElementById('darkModeToggle');
        const htmlElement = document.documentElement;

        if (localStorage.getItem('theme') === 'dark') {
            htmlElement.setAttribute('data-bs-theme', 'dark');
            toggleBtn.innerHTML = '<span>Claro</span><i class="bi bi-sun"></i>';
        }

        toggleBtn.addEventListener('click', () => {
            if (htmlElement.getAttribute('data-bs-theme') === 'dark') {
                htmlElement.setAttribute('data-bs-theme', 'light');
                localStorage.setItem('theme', 'light');
                toggleBtn.innerHTML = '<span>Escuro</span><i class="bi bi-moon-stars"></i>';
            } else {
                htmlElement.setAttribute('data-bs-theme', 'dark');
                localStorage.setItem('theme', 'dark');
                toggleBtn.innerHTML = '<span>Claro</span><i class="bi bi-sun"></i>';
            }
        });
    </script>
</body>
</html>
