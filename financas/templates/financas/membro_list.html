{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Membros da Família</h2>
    <a href="{% url 'membro_create' %}" class="btn btn-primary">+ Novo Membro</a>
</div>

<div class="row">
    {% for m in membros %}
    <div class="col-md-4 mb-4">
        <div class="card h-100 shadow-sm border-0">
            <div class="card-body d-flex align-items-center gap-3">
                <div class="rounded-circle" style="width: 50px; height: 50px; background-color: {{ m.cor }};"></div>
                <div>
                    <h5 class="mb-0 fw-bold">{{ m.nome }}</h5>
                    <small class="text-muted">ID: #{{ m.id }}</small>
                </div>
                <div class="ms-auto d-flex gap-2">
                    <a href="{% url 'membro_update' m.pk %}" class="btn btn-sm btn-outline-primary" title="Editar"><i class="bi bi-pencil"></i></a>
                    <a href="{% url 'membro_delete' m.pk %}" class="btn btn-sm btn-outline-danger" title="Excluir"><i class="bi bi-trash"></i></a>
                </div>
            </div>
        </div>
    </div>
    {% empty %}
    <p class="text-center py-5 text-muted">Nenhum membro cadastrado.</p>
    {% endfor %}
</div>
{% endblock %}
