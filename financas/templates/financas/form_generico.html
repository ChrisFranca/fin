{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm p-4 p-md-5">
            <div class="d-flex align-items-center mb-4">
                <div class="bg-primary-subtle p-3 rounded-4 me-3">
                    <i class="bi bi-pencil-square fs-3 text-primary"></i>
                </div>
                <div>
                    <h3 class="fw-bold mb-1">{{ titulo|default:"Formulário de Cadastro" }}</h3>
                    <p class="text-muted small mb-0">Preencha os campos abaixo com atenção.</p>
                </div>
            </div>
            
            <hr class="mb-4 opacity-50">
            
            <form method="post" class="needs-validation" novalidate>
                {% csrf_token %}
                
                <div class="row g-3">
                    {{ form|crispy }}
                </div>

                <div class="d-flex flex-column flex-md-row justify-content-between gap-3 mt-5">
                    <a href="javascript:history.back()" class="btn btn-light px-4 py-2 border">
                        <i class="bi bi-arrow-left me-2"></i>Voltar
                    </a>
                    <button type="submit" class="btn btn-primary px-5 py-2">
                        <i class="bi bi-check-lg me-2"></i>Confirmar e Salvar
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<style>
    /* Estilização para deixar o Crispy Forms mais moderno */
    .form-label { font-weight: 600; color: #495057; font-size: 0.9rem; }
    .form-control, .form-select { 
        padding: 0.75rem 1rem; 
        border-radius: 12px; 
        border: 1px solid #dee2e6;
        transition: border-color 0.2s, box-shadow 0.2s;
    }
    .form-control:focus { 
        border-color: #0d6efd; 
        box-shadow: 0 0 0 0.25rem rgba(13, 110, 253, 0.1); 
    }
    [data-bs-theme="dark"] .form-label { color: #adb5bd; }
    [data-bs-theme="dark"] .form-control, [data-bs-theme="dark"] .form-select { 
        background-color: #12151c; 
        border-color: #2d323c; 
        color: #fff;
    }
</style>
{% endblock %}
