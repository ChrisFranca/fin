{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm p-4 p-md-5 text-center">
            <div class="bg-danger-subtle p-3 rounded-circle d-inline-flex mb-4 mx-auto" style="width: 80px; height: 80px; align-items: center; justify-content: center;">
                <i class="bi bi-exclamation-triangle fs-1 text-danger"></i>
            </div>
            
            <h3 class="fw-bold mb-3">Tem certeza?</h3>
            <p class="text-muted mb-5">
                Você está prestes a excluir <strong>"{{ object }}"</strong>.<br>
                Esta ação não poderá ser desfeita.
            </p>
            
            <form method="post">
                {% csrf_token %}
                <div class="d-flex flex-column flex-md-row justify-content-center gap-3">
                    <a href="javascript:history.back()" class="btn btn-light px-4 py-2 border">
                        <i class="bi bi-x-lg me-2"></i>Cancelar
                    </a>
                    <button type="submit" class="btn btn-danger px-5 py-2">
                        <i class="bi bi-trash me-2"></i>Sim, Excluir Definitivamente
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
