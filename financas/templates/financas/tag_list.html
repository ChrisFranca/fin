{% extends 'base.html' %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Tags</h2>
    <a href="{% url 'tag_create' %}" class="btn btn-primary">+ Nova Tag</a>
</div>

<div class="row">
    <div class="col-12">
        <div class="card p-4 border-0 shadow-sm">
            <div class="d-flex flex-wrap gap-3">
                {% for t in tags %}
                <div class="d-flex align-items-center bg-light border rounded px-3 py-2">
                    <span class="me-3">
                        <i class="bi bi-tag-fill me-1"></i> {{ t.nome }}
                    </span>
                    <div class="btn-group">
                        <a href="{% url 'tag_update' t.pk %}" class="btn btn-sm btn-link p-0 text-primary me-2"><i class="bi bi-pencil"></i></a>
                        <a href="{% url 'tag_delete' t.pk %}" class="btn btn-sm btn-link p-0 text-danger"><i class="bi bi-trash"></i></a>
                    </div>
                </div>
                {% empty %}
                <p class="text-muted">Nenhuma tag cadastrada.</p>
                {% endfor %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
