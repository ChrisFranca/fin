{% extends 'base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="mb-4"><i class="bi bi-file-earmark-arrow-up"></i> Importar Extrato</h3>
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Selecione a Conta</label>
                        <select name="conta" class="form-select" required>
                            {% for conta in contas %}
                            <option value="{{ conta.id }}">{{ conta.nome }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label">Arquivo Extrato (.CSV ou .OFX)</label>
                        <input type="file" name="arquivo" class="form-control" accept=".csv, .ofx" required>
                        <small class="text-muted">Dica: Use .OFX para melhor precisão bancária.</small>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary">Processar Arquivo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
